<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body>
    
<section class="form-section">
  <div class="container">
    <div class="form-box">

      <h2 class="form-title">Contact </h2>
      <p class="form-subtitle">
        Fill in the form and we'll get back to you within 2 hours.
      </p>

      <form>

        <div class="row g-3">

          <!-- Name -->
          <div class="col-12 col-md-6">
            <label>YOUR NAME *</label>
            <input type="text" class="form-control"  id= "name" placeholder="Priya Sharma" required>
          </div>

          <!-- Email -->
          <div class="col-12 col-md-6">
            <label>EMAIL *</label>
            <input type="email" class="form-control"   id= "email" placeholder="priya@email.com" required>
          </div>

          <!-- Phone -->
          <div class="col-12 col-md-6">
            <label>PHONE</label>
            <input type="text" class="form-control"   id= "phone" placeholder="0000000000" pattern="[0-9]{10}">
          </div>

          <!-- Subject -->
          <div class="col-12 col-md-6">
            <label>SUBJECT *</label>
            <select class="form-control"   id= "subject" required>
              <option>Select Size</option>
              <option>Small</option>
              <option>Medium</option>
              <option>Large</option>
            </select>
          </div>

          <!-- Message -->
          <div class="col-12">
            <label>MESSAGE *</label>
            <textarea class="form-control"   id= "message" rows="5"
              placeholder="Tell us" required></textarea>
          </div>

        </div>

        <!-- Button -->
        <button type="submit" class="submit-btn mt-4">
          <i class="fa-solid fa-paper-plane"></i> Submit
        </button>

      </form>

    </div>
  </div>
</section>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault();

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let subject = document.getElementById("subject").value;
  let message = document.getElementById("message").value.trim();

  if (name === "" || email === "" || subject === "Select Size" || message === "") {
    alert("Please fill all required fields");
    return;
  }

  let msg = `Hello, I want to contact you:

Name: ${name}
Email: ${email}
Phone: ${phone}
Subject: ${subject}
Message: ${message}`;

  let url = "https://wa.me/918591807823?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
});
</script>
</body>
</html>
